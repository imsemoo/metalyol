<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lusail Advanced Blueprint</title>
<style>
body {
  margin:0;
  background:#06101f;
}

svg {
  width:100%;
  height:100vh;
}

.line { stroke:#3fa9f5; fill:none; stroke-width:1.2; }
.shell { stroke:#00eaff; fill:none; stroke-width:2; }
.rib { stroke:#00eaff; fill:none; stroke-width:1; opacity:.9; }
.inner { stroke:#00eaff; fill:none; opacity:.4; }
.glass { stroke:#6fd3ff; fill:none; opacity:.5; }
.light { stroke:#ff2a2a; fill:none; stroke-width:1.5; }
</style>
</head>

<body>

<svg viewBox="0 0 1200 700">

<!-- GRID -->
<defs>
<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
<path d="M40 0 L0 0 0 40" stroke="#0f2d4d" stroke-width="0.5"/>
</pattern>
</defs>

<rect width="100%" height="100%" fill="url(#grid)" />

<!-- BASE PLATFORM (3D) -->
<polygon points="250,500 950,500 880,550 180,550" class="line"/>
<line x1="250" y1="500" x2="180" y2="550" class="line"/>
<line x1="950" y1="500" x2="880" y2="550" class="line"/>

<!-- WATER -->
<line x1="100" y1="550" x2="1100" y2="550" stroke="#1c4f80" stroke-dasharray="6 6"/>

<!-- COLUMNS -->
<line x1="350" y1="500" x2="320" y2="420" class="line"/>
<line x1="500" y1="500" x2="470" y2="420" class="line"/>
<line x1="650" y1="500" x2="620" y2="420" class="line"/>
<line x1="800" y1="500" x2="770" y2="420" class="line"/>

<!-- OUTER SHELL -->
<path d="M250 420 
C400 150, 800 120, 980 350 
C900 430, 700 460, 500 440 
C380 430, 300 430, 250 420"
class="shell"/>

<!-- INNER SHELL -->
<path d="M280 420 
C420 180, 780 160, 920 350"
class="inner"/>

<!-- GLASS FACADE -->
<rect x="380" y="420" width="400" height="80" class="glass"/>
<line x1="380" y1="450" x2="780" y2="450" class="glass"/>

<!-- RIBS (HIGH DENSITY PARAMETRIC) -->
<path d="M280 420 C420 170, 780 150, 920 350" class="rib"/>
<path d="M300 420 C430 180, 770 160, 900 350" class="rib"/>
<path d="M320 420 C450 190, 760 170, 880 350" class="rib"/>
<path d="M340 420 C470 200, 750 180, 860 350" class="rib"/>
<path d="M360 420 C490 210, 740 190, 840 350" class="rib"/>
<path d="M380 420 C510 220, 730 200, 820 350" class="rib"/>
<path d="M400 420 C530 230, 720 210, 800 350" class="rib"/>
<path d="M420 420 C550 240, 710 220, 780 350" class="rib"/>
<path d="M440 420 C570 250, 700 230, 760 350" class="rib"/>
<path d="M460 420 C590 260, 690 240, 740 350" class="rib"/>

<!-- RED LIGHT STRIPS -->
<path d="M260 400 C400 150, 800 120, 980 350" class="light"/>
<path d="M290 400 C420 170, 780 140, 950 350" class="light"/>

<!-- DEPTH LINES -->
<line x1="250" y1="420" x2="180" y2="460" class="inner"/>
<line x1="980" y1="350" x2="880" y2="400" class="inner"/>

<!-- LABEL -->
<text x="60" y="80" fill="#00eaff" font-size="28">
Lusail Marina Yacht Club
</text>

</svg>

</body>
</html>
